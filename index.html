<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fancy Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="theme-toggle">
    <label for="theme-switch">🌙</label>
    <input type="checkbox" id="theme-switch" />
    <label for="color-picker">🎨</label>
    <input type="color" id="color-picker" value="#ff9800" title="Pick accent color" />
  </div>
  <div class="calculator">
    <input type="text" id="display" readonly />
    <div class="buttons">
      <button class="op" data-action="clear">C</button>
      <button class="op" data-action="back">←</button>
      <button class="op" data-value="/">÷</button>
      <button class="op" data-value="*">×</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="op" data-value="-">‑</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="op" data-value="+">+</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="equal" data-action="equal">=</button>

      <button data-value="0" class="zero">0</button>
      <button data-value=".">.</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
